- name: test-dry-run
  tags:
    - ci
    - snakemake
    - dry-run
  command: >
    snakemake --dry-run --printshellcmds --cores 1 --forceall
    --snakefile workflow/Snakefile --configfile tests/test_config/config.yaml
  exit_code: 0
  stderr:
    must_not_contain:
      - 'MissingInputException'
      - 'WorkflowError'
  stdout:
    contains:
      - "rename_fastqs"
      - "trim_galore_PE"
      - "STAR"
      - "salmon"
      - "multiqc"
      - "SummarizedExperiment"
      - "deseq2"
      - "gsea"
      - "make_final_report"
      - "isee"

- name: test-dry-run-optional-targets
  tags:
    - ci
    - snakemake
    - dry-run
  command: >
    snakemake --dry-run --printshellcmds --cores 1 --forceall --snakefile workflow/Snakefile
    --configfile tests/test_config/config.yaml
    --config run_vis_bigwig=True run_rseqc=True deploy_to_shinyio=True
    results/avg_bigwigs/untrt.unstr.bw
    results/rseqc_genebody_cov/SRR1039508/SRR1039508.geneBodyCoverage.txt
    results/iSEE/deployed
  exit_code: 0
  stderr:
    must_not_contain:
      - 'MissingInputException'
      - 'WorkflowError'
  stdout:
    contains:
      - "bigwigs"
      - "avg_bigwigs"
      - "rseqc_genebody_cov"
      - "deploy_isee_to_shinyappio"

- name: test-dry-run-variant-targets
  tags:
    - ci
    - snakemake
    - dry-run
  command: >
    snakemake --dry-run --printshellcmds --cores 1 --forceall --snakefile workflow/Snakefile
    --configfile tests/test_config/config.yaml
    --config call_variants=True
    results/variant_calling/final/07a_variant_annot/all.merged.filt.PASS.snpeff.vcf.gz
    results/variant_calling/final/07b_snp_pca_and_dendro/snprelate.html
  exit_code: 0
  stderr:
    must_not_contain:
      - 'MissingInputException'
      - 'WorkflowError'
  stdout:
    contains:
      - "markdups"
      - "splitncigar"
      - "haplotypecaller"
      - "combinevar"
      - "jointgeno"
      - "sortVCF"
      - "filter_vcf"
      - "BQSR"
      - "variant_annot"
      - "snprelate"
